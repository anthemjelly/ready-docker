version: '3.8'
name: ready-docker

# 全局數據卷：與根目錄 compose 共用數據卷，數據互通
volumes:
  db-discord:
    external: false
    driver: local

# 全局網路
networks:
  net-discord-dev:
    driver: bridge

# 敏感配置
secrets:
  db-discord-secret:
    file: ../db/password.txt

services:
  # Dev Container 核心開發容器
  core-dev:
    build:
      context: ..  # 構建上下文為項目根目錄
      dockerfile: ./core/Base.docker  # 指向根目錄的 Dockerfile
      args:
        UID: 10001
        GID: 10001
    stdin_open: true
    tty: true
    # 開發環境不暴露端口，由 Dev Container 自動轉發
    ports:
      - "8060:8060"
    # 環境變量：開發環境專屬配置
    environment:
      - POSTGRES_SERVER=dev-db
      - POSTGRES_USER=postgres
      - POSTGRES_DB=dev_db
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-discord-secret
      - PYTHONPATH=/app
      - HOME=/home/appuser
    # 啟動依賴
    depends_on:
      dev-db:
        condition: service_healthy
    secrets:
      - db-discord-secret
    volumes:
      - ../:/app:cached,uid=10001,gid=10001
    # 容器運行用戶，與 Dockerfile 完全匹配
    user: "10001:10001"
    # 工作目錄
    working_dir: /app
    # 加入專用網路
    networks:
      - net-discord-dev
    # 開發環境不重啟
    restart: no

  python-dev:
    build:
      context: ..
      dockerfile: ./lang/python/Python.docker
      args:
        UID: 10001
        GID: 10001
    stdin_open: true
    tty: true
    ports:
      - "8061:8061"
    depends_on:
      dev-db:
        condition: service_healthy
    secrets:
      - db-discord-secret
    volumes:
      - ../:/app:cached,uid=10001,gid=10001
    user: "10001:10001"
    networks:
      - net-discord-dev
    restart: no

  discord-dev:
    build:
      context: ..
      dockerfile: ./scenarios/discord/Discord.docker
      args:
        UID: 10001
        GID: 10001
    stdin_open: true
    tty: true
    ports:
      - "8062:8062"
    depends_on:
      dev-db:
        condition: service_healthy
    secrets:
      - db-discord-secret
    volumes:
      - ../:/app:cached,uid=10001,gid=10001
    user: "10001:10001"
    networks:
      - net-discord-dev
    restart: no

  # 開發環境專用 PostgreSQL 數據庫
  dev-db:
    image: postgres:18-bookworm
    restart: always
    user: postgres
    secrets:
      - db-discord-secret
    volumes:
      - db-discord:/var/lib/postgresql
    environment:
      - POSTGRES_DB=dev_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-discord-secret
    ports:
      - "8090:8090"
    expose:
      - 8090
    networks:
      - net-discord-dev
    # 健康檢查
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "dev_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s